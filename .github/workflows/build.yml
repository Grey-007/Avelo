name: Build and Release Avelo

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # Required for creating GitHub Releases

jobs:
  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux artifact
        run: flutter build linux --release

      - name: Package Linux release
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../../Avelo-Linux.tar.gz .

      - name: Upload Linux archive
        uses: actions/upload-artifact@v4
        with:
          name: Avelo-Linux
          path: Avelo-Linux.tar.gz

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows artifact
        run: flutter build windows --release

      - name: Package Windows release
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Avelo-Windows.zip

      - name: Upload Windows archive
        uses: actions/upload-artifact@v4
        with:
          name: Avelo-Windows
          path: Avelo-Windows.zip



  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    # Only run this job if a tag starting with 'v' was pushed
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Avelo-Linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Avelo-Windows



      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Avelo-Linux.tar.gz
            Avelo-Windows.zip
          generate_release_notes: true
